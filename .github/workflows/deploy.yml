name: Deploy Frontend

on:
  push:
    branches: [main]
  workflow_dispatch:  # ручной запуск из GitHub UI

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # ── Checkout ─────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Node.js ───────────────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      # ── Install deps ─────────────────────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── Build ────────────────────────────────────────────────────────────────
      - name: Build
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_WS_URL:  ${{ secrets.VITE_WS_URL }}
          VITE_BOT_URL: ${{ secrets.VITE_BOT_URL }}
          # VITE_DEV_BOT_TOKEN намеренно не передаётся — в проде mock не нужен

      # ── Upload to server via rsync over SSH ───────────────────────────────────
      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: ssh-keyscan -p ${{ secrets.SSH_PORT || 22 }} -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy via rsync
        run: |
          rsync -az --delete \
            -e "ssh -p ${{ secrets.SSH_PORT || 22 }} -o StrictHostKeyChecking=no" \
            dist/ \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.FRONTEND_DIST_PATH }}/

      - name: Reload nginx
        run: |
          ssh \
            -p ${{ secrets.SSH_PORT || 22 }} \
            -o StrictHostKeyChecking=no \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "docker exec cyber_farm_frontend nginx -s reload || true"
